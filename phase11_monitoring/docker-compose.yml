version: '3.8'

networks:
  co2-net:
    external: true
    name: phase10_deployment_co2-net

services:
  # Prometheus Server
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: co2-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - co2-net
    restart: unless-stopped

  # Alertmanager (Triggers alerts based on Prometheus rules)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: co2-alertmanager
    ports:
      - "9093:9093"
    networks:
      - co2-net
    restart: unless-stopped

  # Loki (Log Aggregation Engine)
  loki:
    image: grafana/loki:2.9.4
    container_name: co2-loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/data
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - co2-net
    restart: unless-stopped

  # Promtail (Ships logs from host/containers to Loki)
  promtail:
    image: grafana/promtail:2.9.4
    container_name: co2-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - co2-net
    restart: unless-stopped

  # Grafana Dashboard UI
  grafana:
    image: grafana/grafana:10.4.0
    container_name: co2-grafana
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/co2_dashboard.json:/var/lib/grafana/dashboards/co2_dashboard.json:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    networks:
      - co2-net
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
