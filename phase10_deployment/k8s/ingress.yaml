---
# NGINX Ingress Controller — routes external HTTPS traffic into the cluster.
# Requires cert-manager (https://cert-manager.io) installed in the cluster
# for automatic Let's Encrypt certificate provisioning.
#
# Install cert-manager:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# Install ingress-nginx:
#   helm upgrade --install ingress-nginx ingress-nginx \
#     --repo https://kubernetes.github.io/ingress-nginx \
#     --namespace ingress-nginx --create-namespace
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com               # ← Replace with your admin email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: co2-system-ingress
  namespace: co2-system
  labels:
    app.kubernetes.io/name: co2-iot-ventilation
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Force HTTPS redirection
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # WebSocket support for Socket.IO dashboard
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - co2.example.com                  # ← Replace with your domain
      secretName: co2-system-tls-cert
  rules:
    - host: co2.example.com                # ← Replace with your domain
      http:
        paths:
          # FastAPI REST API routes
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: co2-backend-svc
                port:
                  number: 8000
          # FastAPI Swagger docs
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: co2-backend-svc
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: co2-backend-svc
                port:
                  number: 8000
          # FastAPI native WebSocket stream
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: co2-backend-svc
                port:
                  number: 8000
          # Dashboard Socket.IO connections
          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: co2-dashboard-svc
                port:
                  number: 5007
          # Dashboard UI (catch-all — must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: co2-dashboard-svc
                port:
                  number: 5007
