---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: co2-backend
  namespace: co2-system
  labels:
    app.kubernetes.io/name: co2-backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: co2-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime rolling updates
  template:
    metadata:
      labels:
        app: co2-backend
    spec:
      containers:
        - name: co2-backend
          image: ghcr.io/cky200/co2-iot-lstm-ventilation-system/co2-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: INFLUXDB_URL
              valueFrom:
                configMapKeyRef:
                  name: co2-system-config
                  key: INFLUXDB_URL
            - name: INFLUXDB_ORG
              valueFrom:
                configMapKeyRef:
                  name: co2-system-config
                  key: INFLUXDB_ORG
            - name: INFLUXDB_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: co2-system-config
                  key: INFLUXDB_BUCKET
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: co2-system-secrets
                  key: INFLUXDB_TOKEN
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: co2-system-secrets
                  key: SECRET_KEY
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: co2-backend-svc
  namespace: co2-system
  labels:
    app.kubernetes.io/name: co2-backend
    app.kubernetes.io/component: api
spec:
  selector:
    app: co2-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: co2-backend-hpa
  namespace: co2-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: co2-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
