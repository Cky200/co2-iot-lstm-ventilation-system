apiVersion: v1
kind: ConfigMap
metadata:
  name: co2-system-config
  namespace: co2-system
  labels:
    app.kubernetes.io/name: co2-iot-ventilation
data:
  # InfluxDB connection details (non-secret)
  INFLUXDB_URL: "http://influxdb-svc:8086"
  INFLUXDB_ORG: "co2-org"
  INFLUXDB_BUCKET: "co2-data"

  # MQTT broker
  MQTT_BROKER: "mosquitto-svc"
  MQTT_TOPIC: "iot/co2/sensor1"

  # Dashboard tuning
  DASHBOARD_HOST: "0.0.0.0"
  DASHBOARD_PORT: "5007"
  DASHBOARD_CORS_ORIGINS: "*"
  DASHBOARD_HISTORY_LIMIT: "300"
  DASHBOARD_ELEVATED_PPM: "900"
  DASHBOARD_HIGH_PPM: "1200"
  DASHBOARD_CRITICAL_PPM: "1800"
