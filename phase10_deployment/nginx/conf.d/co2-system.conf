# Upstream definitions for load balancing / container mapping
upstream backend_server {
    server co2-backend:8000;
}

upstream dashboard_server {
    server co2-dashboard:5007;
}

# HTTP Server Block - Redirects all traffic to HTTPS (except Let's Encrypt challenges)
server {
    listen 80;
    listen [::]:80;
    server_name co2.example.com; # Replace with production domain name

    # Let's Encrypt ACME Challenge verification path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS securely
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server Block - SSL Termination & App Routing
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name co2.example.com; # Replace with production domain name

    # SSL Certificates (Mounted from Certbot volume)
    # Note: If simulating deployment locally, these paths can point to self-signed certs
    ssl_certificate /etc/letsencrypt/live/co2.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/co2.example.com/privkey.pem;

    # Harden SSL protocols & ciphers (Mozilla Modern Profile guidelines)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # SSL Session Optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;
    # Enable HSTS (Strict-Transport-Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Logging
    access_log /var/log/nginx/co2_access.log;
    error_log /var/log/nginx/co2_error.log warn;

    # 1. Route FastAPI REST endpoints
    location /api/v1/ {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # 2. Route FastAPI Swagger documentation
    location /docs {
        proxy_pass http://backend_server/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://backend_server/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Route FastAPI WebSockets telemetry stream
    location /ws/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # Keep WS open
    }

    # 4. Route Flask Web Dashboard Socket.IO connections
    location /socket.io/ {
        proxy_pass http://dashboard_server/socket.io/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # 5. Route Dashboard HTML & REST API updates (e.g. /api/telemetry, /health)
    location / {
        proxy_pass http://dashboard_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }
}
