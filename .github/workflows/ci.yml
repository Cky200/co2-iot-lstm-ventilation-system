name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    name: Code Quality (Ruff & MyPy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff Linter
        run: ruff check --config phase9_devops_cicd/config/ruff.toml .

      - name: Run Ruff Formatter Check
        run: ruff format --config phase9_devops_cicd/config/ruff.toml --check .

      - name: Run MyPy Static Type Check
        run: |
          # Install dependencies required for typing analysis (to avoid missing imports errors in sources)
          pip install -r requirements.txt
          pip install -r phase7_dashboard_ui/requirements.txt
          mypy --config-file phase9_devops_cicd/config/mypy.ini src/ phase5_iot_firmware/iot_firmware/ phase6_ventilation_control/ventilation_control/ phase7_dashboard_ui/dashboard_ui/

  test:
    name: Run Test Suites
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r phase7_dashboard_ui/requirements.txt
          pip install -r phase8_testing/requirements.txt

      - name: Run Core API & Pipeline Tests
        run: python3 -m pytest tests -v

      - name: Run Phase 5 (IoT Firmware) Tests
        run: python3 -m pytest phase5_iot_firmware/tests -v

      - name: Run Phase 6 (Ventilation Control) Tests
        run: python3 -m pytest phase6_ventilation_control/tests -v

      - name: Run Phase 7 (Dashboard UI) Tests
        run: python3 -m pytest phase7_dashboard_ui/tests -v

      - name: Run Phase 8 (Comprehensive & Coverage) Tests
        run: |
          cd phase8_testing
          python3 -m pytest -c pytest.ini --cov-config=.coveragerc --cov --cov-report=xml --cov-report=term-missing

      - name: Upload Coverage Report XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: phase8_testing/reports/coverage.xml
          retention-days: 14
